<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MySynthesizer Workbench</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div>
          <h1>MySynthesizer</h1>
          <p>本地单机合成器工作台</p>
        </div>
        <div class="mode">
          <button id="opAdd" class="active" type="button">add</button>
          <button id="opSubtract" type="button">subtract</button>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel">
          <label for="searchInput">搜索对象</label>
          <div class="search-row">
            <input id="searchInput" type="search" placeholder="名称、描述、type" />
            <button id="searchButton" type="button">搜索</button>
          </div>
          <div id="results" class="results"></div>
          <section id="objectDetail" class="detail empty"></section>
        </aside>

        <section class="panel main-panel">
          <div class="slots">
            <div class="slot">
              <span>A</span>
              <strong id="slotAName">未选择</strong>
              <small id="slotADesc"></small>
            </div>
            <div class="slot">
              <span>B</span>
              <strong id="slotBName">未选择</strong>
              <small id="slotBDesc"></small>
            </div>
          </div>
          <button id="craftButton" class="primary" type="button">合成</button>
          <section id="craftSummary" class="summary empty"></section>
          <section id="topMatches" class="matches"></section>
          <details class="raw">
            <summary>原始结果</summary>
            <pre id="output" class="output"></pre>
          </details>
        </section>

        <aside class="panel">
          <label>审核 pending</label>
          <input id="reviewId" type="number" placeholder="pending id" />
          <input id="canonicalId" type="number" placeholder="canonical id" />
          <input id="rejectReason" type="text" placeholder="reject reason" />
          <div class="review-actions">
            <button id="promoteButton" type="button">promote</button>
            <button id="rejectButton" type="button">reject</button>
            <button id="mergeButton" type="button">merge</button>
          </div>
          <pre id="reviewOutput" class="output small"></pre>
          <section class="maintenance">
            <label>维护</label>
            <button id="resetButton" class="danger" type="button">还原到初始四元素</button>
            <pre id="resetOutput" class="output small"></pre>
          </section>
          <section class="maintenance">
            <label>LLM 设置</label>
            <input id="llmBaseUrl" type="url" placeholder="base url" autocomplete="off" />
            <input id="llmModel" type="text" placeholder="model" autocomplete="off" />
            <input id="llmApiKey" type="password" placeholder="api key（留空则保留）" autocomplete="off" />
            <div class="settings-row">
              <input id="llmTemperature" type="number" min="0" max="2" step="0.1" placeholder="temperature" />
              <input id="llmTopP" type="number" min="0" max="1" step="0.05" placeholder="top_p" />
            </div>
            <input id="llmTimeout" type="number" min="1" max="300" step="1" placeholder="timeout 秒" />
            <label class="check-row">
              <input id="llmClearKey" type="checkbox" />
              <span>清除已保存 key</span>
            </label>
            <button id="saveLlmSettingsButton" type="button">保存 LLM 设置</button>
            <pre id="llmSettingsOutput" class="output small"></pre>
          </section>
        </aside>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
